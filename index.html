<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="İlaç Takip">
<title>İlaç Takip</title>
<link rel="manifest" href="manifest.json?v=20260420">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles.css?v=20260420">
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>💊 İlaç Takip</h1>
        <p id="header-date"></p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="requestNotif()" title="Bildirim">🔔</button>
        <button class="icon-btn" onclick="exportData()" title="Yedek">💾</button>
        <button class="icon-btn" onclick="importData()" title="Geri Yükle">📂</button>
      </div>
    </div>
  </div>
  <div class="today-bar">
    <div class="today-stat"><div class="num" id="stat-total">0</div><div class="lbl">İlaç</div></div>
    <div class="today-stat"><div class="num" id="stat-today">0</div><div class="lbl">Bugün</div></div>
    <div class="today-stat"><div class="num" id="stat-done">0</div><div class="lbl">Alındı</div></div>
  </div>
  <div class="tabs">
    <button class="tab" data-tab="ilaclar" onclick="switchTab('ilaclar',this)">💊 İlaçlar</button>
    <button class="tab active" data-tab="bugun" onclick="switchTab('bugun',this)">📅 Bugün</button>
    <button class="tab" data-tab="gecmis" onclick="switchTab('gecmis',this)">📋 Geçmiş</button>
  </div>
  <div class="content">
    <div class="page" id="page-ilaclar">
      <div id="notif-prompt"></div>
      <div id="drug-list"></div>
    </div>
    <div class="page active" id="page-bugun"><div id="today-alarms"></div></div>
    <div class="page" id="page-gecmis"><div id="history-list"></div></div>
  </div>
  <button class="fab" onclick="openAddModal()">+</button>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Yeni İlaç Ekle</div>
    <div class="form-group">
      <label class="form-label">Kutu Fotoğrafı</label>
      <div class="photo-upload">
        <input type="file" accept="image/*" capture="environment" id="photo-input" onchange="handlePhoto(event)">
        <div id="photo-placeholder"><div class="icon">📷</div><p>Fotoğraf çek veya galeriden seç</p></div>
        <img class="photo-preview" id="photo-preview">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">İlaç Adı *</label>
      <input type="text" class="form-input" id="drug-name" placeholder="Örn: Beloc Zok 50mg">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Doktor</label>
        <input type="text" class="form-input" id="drug-doctor" placeholder="Dr. Adı">
      </div>
      <div class="form-group">
        <label class="form-label">Hastane</label>
        <input type="text" class="form-input" id="drug-hospital" placeholder="Hastane">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Reçete Tarihi</label>
        <input type="date" class="form-input" id="drug-date">
      </div>
      <div class="form-group">
        <label class="form-label">Günde Kaç Adet</label>
        <input type="number" class="form-input" id="drug-daily" min="1" max="10" value="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Kullanım Süresi</label>
      <select class="form-input" id="drug-duration" onchange="toggleDuration()">
        <option value="omur_boyu">Ömür Boyu</option>
        <option value="sure">Belirli Süre (Gün)</option>
        <option value="adet">Kutu Bitince</option>
      </select>
    </div>
    <div id="duration-days-wrap" class="form-group" style="display:none">
      <label class="form-label">Kaç Gün</label>
      <input type="number" class="form-input" id="drug-days" min="1" placeholder="30">
    </div>
    <div class="form-group">
      <label class="form-label">Alarm Saatleri</label>
      <div class="time-slots" id="time-slots"></div>
      <button class="add-time-btn" style="margin-top:8px" onclick="addTimeSlot()">+ Saat Ekle</button>
    </div>
    <div class="form-group">
      <label class="form-label">Kullanım Durumu</label>
      <div class="usage-condition-group">
        <label class="usage-condition-option">
          <input type="radio" name="usage-condition" value="ac">
          <span>Aç</span>
        </label>
        <label class="usage-condition-option">
          <input type="radio" name="usage-condition" value="tok" checked>
          <span>Tok</span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Kutudaki Tablet Adedi</label>
      <div class="stock-counter">
        <button onclick="changeStock(-10)">−10</button>
        <button onclick="changeStock(-1)">−</button>
        <div class="val" id="stock-val">30</div>
        <button onclick="changeStock(1)">+</button>
        <button onclick="changeStock(10)">+10</button>
      </div>
    </div>
    <div class="form-group">
      <div class="toggle-row">
        <span class="toggle-label">🔔 Alarm Aktif</span>
        <label class="toggle"><input type="checkbox" id="drug-alarm" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
    <button class="btn-primary" onclick="saveDrug()">✅ Kaydet</button>
    <button class="btn-primary btn-danger" id="delete-btn" style="display:none;margin-top:10px" onclick="deleteDrug()">🗑️ Sil</button>
    <button style="width:100%;padding:14px;background:none;border:none;font-family:'Nunito',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;margin-top:8px" onclick="closeModal()">İptal</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" id="detail-content"></div>
</div>

<input type="file" id="import-file" accept="application/json" style="display:none">

<script>
  // Web Push yapılandırması (deploy ortamında gerçek değerleri verin)
  window.__PUSH_PUBLIC_KEY__ = '';
  window.__PUSH_SERVER_BASE_URL__ = '';

  // Firebase Web App yapılandırması (deployer burada gerçek Firebase config girmeli)
  window.__FIREBASE_CONFIG__ = {
    apiKey: '',
    authDomain: '',
    projectId: '',
    storageBucket: '',
    messagingSenderId: '',
    appId: '',
  };
</script>
<script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
<script defer src="src/main.js?v=20260420"></script>
</body>
</html>
